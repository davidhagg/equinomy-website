<svg viewBox="0 0 300 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#AE2E8A"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="grh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#AE2E8A"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <!-- Gradient screen header -->
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#AE2E8A"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="sh" x="-12%" y="-6%" width="124%" height="118%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <clipPath id="sc">
      <rect x="8" y="8" width="284" height="624" rx="44"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect x="4" y="4" width="292" height="632" rx="48" fill="#1C1C1E" filter="url(#sh)"/>
  <rect x="8" y="8" width="284" height="624" rx="44" fill="#F5F5F5"/>

  <g clip-path="url(#sc)">
    <!-- Dynamic island -->
    <rect x="114" y="16" width="72" height="26" rx="13" fill="#1C1C1E"/>

    <!-- Gradient navigation header -->
    <rect x="8" y="8" width="284" height="58" fill="url(#hdr)"/>

    <!-- Status bar: time (white on gradient) -->
    <text x="26" y="38" font-family="-apple-system,system-ui,sans-serif" font-size="13.5" font-weight="600" fill="white">9:41</text>
    <!-- Battery (white) -->
    <rect x="254" y="30" width="24" height="12" rx="3.5" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <rect x="278" y="33.5" width="2.5" height="5" rx="1" fill="white" opacity="0.5"/>
    <rect x="256.5" y="32" width="17" height="8" rx="2" fill="white" opacity="0.9"/>
    <!-- Signal (white) -->
    <rect x="240" y="34" width="3" height="8" rx="1.5" fill="white"/>
    <rect x="245.5" y="36.5" width="3" height="5.5" rx="1.5" fill="white"/>
    <rect x="251" y="38.5" width="3" height="3.5" rx="1.5" fill="white" opacity="0.4"/>

    <!-- Header title "Utgifter" -->
    <text x="150" y="55" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Utgifter</text>
    <!-- Crown icon top-right (premium) -->
    <path d="M266,47 L270,42 L274,47 L278,42 L282,47 L280,52 L268,52 Z" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" opacity="0.85"/>

    <!-- SEARCH BAR -->
    <rect x="16" y="70" width="268" height="40" rx="12" fill="white"/>
    <!-- Magnifier icon -->
    <circle cx="35" cy="90" r="7" fill="none" stroke="#BDBDBD" stroke-width="1.8"/>
    <line x1="40" y1="95" x2="44" y2="99" stroke="#BDBDBD" stroke-width="1.8" stroke-linecap="round"/>
    <text x="55" y="94.5" font-family="-apple-system,sans-serif" font-size="13.5" fill="#BDBDBD">Sök utgifter...</text>

    <!-- SORT PILLS -->
    <rect x="176" y="118" width="56" height="26" rx="13" fill="white" stroke="#AE2E8A" stroke-width="1.5"/>
    <text x="204" y="135" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#AE2E8A" text-anchor="middle">Datum</text>
    <!-- down arrow -->
    <polyline points="228,126 231,130 234,126" fill="none" stroke="#AE2E8A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="240" y="118" width="56" height="26" rx="13" fill="white" stroke="#E0E0E0" stroke-width="1.2"/>
    <text x="268" y="135" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="#9E9E9E" text-anchor="middle">Belopp</text>

