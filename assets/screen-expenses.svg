    <!-- Item 1: Farrier -->
    <rect x="16" y="154" width="268" height="66" rx="13" fill="white"/>
    <rect x="30" y="169" width="38" height="38" rx="10" fill="#F4B4B8"/>
    <!-- horseshoe icon dots -->
    <circle cx="49" cy="182" r="4" fill="none" stroke="#212121" stroke-width="1.8"/>
    <path d="M43,186 Q43,193 49,193 Q55,193 55,186" fill="none" stroke="#212121" stroke-width="1.8" stroke-linecap="round"/>
    <text x="78" y="179" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121">Hovslagare</text>
    <text x="266" y="179" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#212121" text-anchor="end">850 kr</text>
    <text x="78" y="195" font-family="-apple-system,sans-serif" font-size="11.5" fill="#9E9E9E">Regelbunden trimning</text>
    <text x="78" y="210" font-family="-apple-system,sans-serif" font-size="10.5" fill="#9E9E9E">Bella · 3 mar 2026</text>
    <rect x="224" y="203" width="34" height="16" rx="8" fill="#AE2E8A18"/>
    <text x="241" y="215" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#AE2E8A" text-anchor="middle">Fast</text>

    <!-- Item 2: Feed -->
    <rect x="16" y="228" width="268" height="66" rx="13" fill="white"/>
    <rect x="30" y="243" width="38" height="38" rx="10" fill="#F4E0A8"/>
    <!-- grain icon simplified -->
    <ellipse cx="49" cy="258" rx="5" ry="8" fill="none" stroke="#212121" stroke-width="1.7"/>
    <line x1="49" y1="254" x2="49" y2="266" stroke="#212121" stroke-width="1.2"/>
    <line x1="44.5" y1="258" x2="53.5" y2="258" stroke="#212121" stroke-width="1.2"/>
    <text x="78" y="253" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121">Foder</text>
    <text x="266" y="253" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#212121" text-anchor="end">3 250 kr</text>
    <text x="78" y="269" font-family="-apple-system,sans-serif" font-size="11.5" fill="#9E9E9E">Hösilage Mars</text>
    <text x="78" y="284" font-family="-apple-system,sans-serif" font-size="10.5" fill="#9E9E9E">Bella · 1 mar 2026</text>
    <rect x="220" y="277" width="42" height="16" rx="8" fill="#FFA72618"/>
    <text x="241" y="289" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#F57C00" text-anchor="middle">Engång</text>

    <!-- Item 3: Vet -->
    <rect x="16" y="302" width="268" height="66" rx="13" fill="white"/>
    <rect x="30" y="317" width="38" height="38" rx="10" fill="#BAC4F2"/>
    <!-- stethoscope / cross icon -->
