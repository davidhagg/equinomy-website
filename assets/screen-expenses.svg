    <line x1="41.5" y1="336" x2="56.5" y2="336" stroke="#212121" stroke-width="2.2" stroke-linecap="round"/>
    <text x="78" y="327" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121">Veterinär</text>
    <text x="266" y="327" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#212121" text-anchor="end">1 680 kr</text>
    <text x="78" y="343" font-family="-apple-system,sans-serif" font-size="11.5" fill="#9E9E9E">Hälsokontroll</text>
    <text x="78" y="358" font-family="-apple-system,sans-serif" font-size="10.5" fill="#9E9E9E">Bella · 28 feb 2026</text>
