    <circle cx="43" cy="472" r="4" fill="none" stroke="#212121" stroke-width="1.8"/>
    <text x="78" y="475" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121">Utrustning</text>
    <text x="266" y="475" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#212121" text-anchor="end">1 200 kr</text>
    <text x="78" y="491" font-family="-apple-system,sans-serif" font-size="11.5" fill="#9E9E9E">Ny sadel</text>
    <text x="78" y="506" font-family="-apple-system,sans-serif" font-size="10.5" fill="#9E9E9E">Bella · 18 feb 2026</text>
