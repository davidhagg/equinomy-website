    <rect x="30" y="391" width="38" height="38" rx="10" fill="#C8B8F4"/>
    <!-- star/sparkle icon -->
    <path d="M49,396 L51,402 L57,402 L52.5,406 L54,412 L49,409 L44,412 L45.5,406 L41,402 L47,402 Z" fill="#212121" opacity="0.6"/>
    <text x="78" y="401" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121">Träning</text>
    <text x="266" y="401" font-family="-apple-system,sans-serif" font-size="14" font-weight="700" fill="#212121" text-anchor="end">500 kr</text>
    <text x="78" y="417" font-family="-apple-system,sans-serif" font-size="11.5" fill="#9E9E9E">Dressyrlektion</text>
    <text x="78" y="432" font-family="-apple-system,sans-serif" font-size="10.5" fill="#9E9E9E">Bella · 24 feb 2026</text>
