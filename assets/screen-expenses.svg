    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F5F5F5" stop-opacity="1"/>
    </linearGradient>
    <rect x="8" y="530" width="284" height="52" fill="url(#fade)"/>

    <!-- TAB BAR -->
    <rect x="8" y="582" width="284" height="50" fill="white"/>
    <line x1="8" y1="582" x2="292" y2="582" stroke="#E0E0E0" stroke-width="0.75"/>

    <!-- Tab 1: Home -->
    <path d="M29,608 L29,601 L37,601 L37,608" fill="none" stroke="#9E9E9E" stroke-width="1.8" stroke-linejoin="round"/>
    <polyline points="25,604 33,596.5 41,604" fill="none" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="33" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Hem</text>

    <!-- Tab 2: Expenses (active, gradient) -->
    <line x1="83" y1="597" x2="93" y2="597" stroke="url(#grh)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="83" y1="602" x2="93" y2="602" stroke="url(#grh)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="83" y1="607" x2="90" y2="607" stroke="url(#grh)" stroke-width="1.8" stroke-linecap="round"/>
    <text x="88" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#AE2E8A" text-anchor="middle" font-weight="600">Utgifter</text>

    <!-- Tab 3: Add (gradient circle) -->
    <circle cx="150" cy="602" r="17" fill="url(#gr)"/>
    <line x1="150" y1="595.5" x2="150" y2="608.5" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
    <line x1="143.5" y1="602" x2="156.5" y2="602" stroke="white" stroke-width="2.3" stroke-linecap="round"/>

    <!-- Tab 4: Horses -->
    <ellipse cx="209" cy="604" rx="8" ry="5" fill="none" stroke="#9E9E9E" stroke-width="1.6"/>
    <circle cx="219" cy="598" r="4.5" fill="none" stroke="#9E9E9E" stroke-width="1.6"/>
    <line x1="214" y1="601" x2="216" y2="600" stroke="#9E9E9E" stroke-width="1.6"/>
    <path d="M220,593.5 L222,591 L223,594" fill="none" stroke="#9E9E9E" stroke-width="1.2" stroke-linejoin="round"/>
    <line x1="203" y1="609" x2="201" y2="616" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="207" y1="609" x2="206" y2="616" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="213" y1="609" x2="213" y2="616" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <text x="212" y="626" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Hästar</text>

    <!-- Tab 5: Statistics -->
    <rect x="256" y="606" width="4" height="5" rx="1" fill="#9E9E9E"/>
    <rect x="262" y="601" width="4" height="10" rx="1" fill="#9E9E9E"/>
    <rect x="268" y="598" width="4" height="13" rx="1" fill="#9E9E9E"/>
    <text x="264" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Statistik</text>
  </g>
</svg>
