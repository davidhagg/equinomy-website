    <rect x="262" y="601" width="4" height="10" rx="1" fill="#9E9E9E"/>
    <rect x="268" y="598" width="4" height="13" rx="1" fill="#9E9E9E"/>
    <text x="264" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Statistik</text>
  </g>
</svg>
