  <!-- Phone frame -->
  <rect x="4" y="4" width="292" height="632" rx="48" fill="#1C1C1E" filter="url(#sh)"/>
  <rect x="8" y="8" width="284" height="624" rx="44" fill="#F5F5F5"/>

  <g clip-path="url(#sc)">
