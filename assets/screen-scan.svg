    <rect x="220" y="404" width="13" height="13" rx="2.5" fill="none" stroke="#AE2E8A" stroke-width="1.6"/>
    <rect x="203" y="421" width="13" height="13" rx="2.5" fill="none" stroke="#AE2E8A" stroke-width="1.6" opacity="0.5"/>
    <rect x="220" y="421" width="13" height="13" rx="2.5" fill="none" stroke="#AE2E8A" stroke-width="1.6" opacity="0.5"/>
