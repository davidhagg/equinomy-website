    <path d="M29,608 L29,601 L37,601 L37,608" fill="none" stroke="#9E9E9E" stroke-width="1.8" stroke-linejoin="round"/>
    <polyline points="25,604 33,596.5 41,604" fill="none" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="33" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Hem</text>

