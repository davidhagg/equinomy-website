    <line x1="83" y1="597" x2="93" y2="597" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="83" y1="602" x2="93" y2="602" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="83" y1="607" x2="90" y2="607" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round"/>
    <text x="88" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Utgifter</text>

