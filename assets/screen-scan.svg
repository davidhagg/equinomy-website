    <rect x="256.5" y="32" width="17" height="8" rx="2" fill="white" opacity="0.9"/>
    <rect x="240" y="34" width="3" height="8" rx="1.5" fill="white"/>
    <rect x="245.5" y="36.5" width="3" height="5.5" rx="1.5" fill="white"/>
