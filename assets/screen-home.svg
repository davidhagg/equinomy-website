<svg viewBox="0 0 300 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#AE2E8A"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="grh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#AE2E8A"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="sh" x="-12%" y="-6%" width="124%" height="118%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <clipPath id="sc">
      <rect x="8" y="8" width="284" height="624" rx="44"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect x="4" y="4" width="292" height="632" rx="48" fill="#1C1C1E" filter="url(#sh)"/>
  <!-- Screen -->
  <rect x="8" y="8" width="284" height="624" rx="44" fill="#F5F5F5"/>

  <g clip-path="url(#sc)">
    <!-- Dynamic island -->
    <rect x="114" y="16" width="72" height="26" rx="13" fill="#1C1C1E"/>

    <!-- Status bar: time -->
    <text x="26" y="40" font-family="-apple-system,system-ui,sans-serif" font-size="13.5" font-weight="600" fill="#1C1C1E">9:41</text>
    <!-- Battery -->
    <rect x="254" y="31" width="24" height="12" rx="3.5" fill="none" stroke="#1C1C1E" stroke-width="1.5"/>
    <rect x="278" y="34.5" width="2.5" height="5" rx="1" fill="#1C1C1E" opacity="0.4"/>
    <rect x="256.5" y="33" width="17" height="8" rx="2" fill="#1C1C1E"/>
    <!-- Signal bars -->
    <rect x="240" y="35" width="3" height="8" rx="1.5" fill="#1C1C1E"/>
    <rect x="245.5" y="37.5" width="3" height="5.5" rx="1.5" fill="#1C1C1E"/>
    <rect x="251" y="39.5" width="3" height="3.5" rx="1.5" fill="#1C1C1E" opacity="0.35"/>

    <!-- HEADER: filter + avatar (right-aligned) -->
    <circle cx="244" cy="73" r="19" fill="white"/>
    <!-- Tune icon (3 lines with knobs) -->
    <line x1="237" y1="67" x2="251" y2="67" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="241.5" cy="67" r="2.8" fill="white" stroke="#9E9E9E" stroke-width="1.4"/>
    <line x1="237" y1="73" x2="251" y2="73" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="247" cy="73" r="2.8" fill="white" stroke="#9E9E9E" stroke-width="1.4"/>
    <line x1="237" y1="79" x2="251" y2="79" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="242.5" cy="79" r="2.8" fill="white" stroke="#9E9E9E" stroke-width="1.4"/>

    <!-- Avatar (gradient circle) -->
    <circle cx="276" cy="73" r="19" fill="url(#gr)"/>
    <text x="276" y="78" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">AS</text>

    <!-- DONUT CHART: cx=150 cy=186 r=62 sw=22 C≈389.56 -->
    <g transform="rotate(-90 150 186)">
      <!-- Feed (amber) 35%: 136.35, offset→0 -->
      <circle cx="150" cy="186" r="62" fill="none" stroke="#F4E0A8" stroke-width="22" stroke-dasharray="136.35 253.21" stroke-dashoffset="389.56"/>
      <!-- Boarding (lavender) 22%: 85.70, offset→253.21 -->
      <circle cx="150" cy="186" r="62" fill="none" stroke="#DBC4F4" stroke-width="22" stroke-dasharray="85.70 303.86" stroke-dashoffset="253.21"/>
      <!-- Farrier (coral) 15%: 58.43, offset→167.51 -->
      <circle cx="150" cy="186" r="62" fill="none" stroke="#F4B4B8" stroke-width="22" stroke-dasharray="58.43 331.13" stroke-dashoffset="167.51"/>
      <!-- Vet (periwinkle) 12%: 46.75, offset→109.08 -->
      <circle cx="150" cy="186" r="62" fill="none" stroke="#BAC4F2" stroke-width="22" stroke-dasharray="46.75 342.81" stroke-dashoffset="109.08"/>
      <!-- Training (violet) 10%: 38.96, offset→62.33 -->
      <circle cx="150" cy="186" r="62" fill="none" stroke="#C8B8F4" stroke-width="22" stroke-dasharray="38.96 350.60" stroke-dashoffset="62.33"/>
      <!-- Other (gray) 6%: 23.37, offset→23.37 -->
      <circle cx="150" cy="186" r="62" fill="none" stroke="#E0E0E0" stroke-width="22" stroke-dasharray="23.37 366.19" stroke-dashoffset="23.37"/>
    </g>
    <!-- White gap ring (draws thin white between outer edge gaps) -->
    <circle cx="150" cy="186" r="73" fill="none" stroke="#F5F5F5" stroke-width="2"/>
    <circle cx="150" cy="186" r="51" fill="none" stroke="#F5F5F5" stroke-width="2"/>
    <!-- Donut hole -->
    <circle cx="150" cy="186" r="50" fill="#F5F5F5"/>

    <!-- Center text -->
    <text x="150" y="181" font-family="-apple-system,sans-serif" font-size="17.5" font-weight="800" fill="#212121" text-anchor="middle">24 580 kr</text>
    <text x="150" y="197" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">1–31 mars 2026</text>

    <!-- LEGEND 2×2 -->
    <circle cx="36" cy="272" r="6" fill="#F4E0A8"/>
    <text x="47" y="276" font-family="-apple-system,sans-serif" font-size="11" fill="#212121" font-weight="500">Foder</text>
    <text x="47" y="288.5" font-family="-apple-system,sans-serif" font-size="9.5" fill="#9E9E9E">35%</text>

    <circle cx="160" cy="272" r="6" fill="#DBC4F4"/>
    <text x="171" y="276" font-family="-apple-system,sans-serif" font-size="11" fill="#212121" font-weight="500">Stallhyra</text>
    <text x="171" y="288.5" font-family="-apple-system,sans-serif" font-size="9.5" fill="#9E9E9E">22%</text>

    <circle cx="36" cy="300" r="6" fill="#F4B4B8"/>
    <text x="47" y="304" font-family="-apple-system,sans-serif" font-size="11" fill="#212121" font-weight="500">Hovslagare</text>
    <text x="47" y="316.5" font-family="-apple-system,sans-serif" font-size="9.5" fill="#9E9E9E">15%</text>

    <circle cx="160" cy="300" r="6" fill="#BAC4F2"/>
    <text x="171" y="304" font-family="-apple-system,sans-serif" font-size="11" fill="#212121" font-weight="500">Veterinär</text>
    <text x="171" y="316.5" font-family="-apple-system,sans-serif" font-size="9.5" fill="#9E9E9E">12%</text>

    <!-- PERIOD SELECTOR PILL -->
    <rect x="66" y="328" width="168" height="36" rx="18" fill="white"/>
    <polyline points="90,340 84,346 90,352" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="150" y="350" font-family="-apple-system,sans-serif" font-size="11.5" font-weight="700" fill="#212121" text-anchor="middle" letter-spacing="0.8">MARS 2026</text>
    <polyline points="210,340 216,346 210,352" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- CATEGORY CARDS -->
    <!-- Card 1: Foder -->
    <rect x="20" y="374" width="260" height="62" rx="13" fill="white"/>
    <text x="34" y="400" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121">Foder</text>
    <text x="266" y="400" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121" text-anchor="end">8 599 kr</text>
    <rect x="34" y="411" width="232" height="6" rx="3" fill="#EEEEEE"/>
    <rect x="34" y="411" width="81.2" height="6" rx="3" fill="#F4E0A8"/>

    <!-- Card 2: Stallhyra -->
    <rect x="20" y="444" width="260" height="62" rx="13" fill="white"/>
    <text x="34" y="470" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121">Stallhyra</text>
    <text x="266" y="470" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121" text-anchor="end">5 408 kr</text>
    <rect x="34" y="481" width="232" height="6" rx="3" fill="#EEEEEE"/>
    <rect x="34" y="481" width="51.0" height="6" rx="3" fill="#DBC4F4"/>

    <!-- Card 3: Hovslagare -->
    <rect x="20" y="514" width="260" height="62" rx="13" fill="white"/>
    <text x="34" y="540" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121">Hovslagare</text>
    <text x="266" y="540" font-family="-apple-system,sans-serif" font-size="13.5" font-weight="600" fill="#212121" text-anchor="end">3 687 kr</text>
    <rect x="34" y="551" width="232" height="6" rx="3" fill="#EEEEEE"/>
    <rect x="34" y="551" width="34.8" height="6" rx="3" fill="#F4B4B8"/>

    <!-- TAB BAR -->
    <rect x="8" y="582" width="284" height="50" fill="white"/>
    <line x1="8" y1="582" x2="292" y2="582" stroke="#E0E0E0" stroke-width="0.75"/>

    <!-- Tab 1: Home (active, gradient) -->
    <path d="M29,608 L29,601 L37,601 L37,608" fill="none" stroke="url(#grh)" stroke-width="1.8" stroke-linejoin="round"/>
    <polyline points="25,604 33,596.5 41,604" fill="none" stroke="url(#grh)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="31" y="602" width="4" height="6" rx="1" fill="url(#grh)" opacity="0.5"/>
    <text x="33" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#AE2E8A" text-anchor="middle" font-weight="600">Hem</text>

    <!-- Tab 2: Expenses (list icon) -->
    <line x1="83" y1="597" x2="93" y2="597" stroke="#9E9E9E" stroke-width="1.7" stroke-linecap="round"/>
    <line x1="83" y1="602" x2="93" y2="602" stroke="#9E9E9E" stroke-width="1.7" stroke-linecap="round"/>
    <line x1="83" y1="607" x2="90" y2="607" stroke="#9E9E9E" stroke-width="1.7" stroke-linecap="round"/>
    <text x="88" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Utgifter</text>

    <!-- Tab 3: Add (gradient circle) -->
    <circle cx="150" cy="602" r="17" fill="url(#gr)"/>
    <line x1="150" y1="595.5" x2="150" y2="608.5" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
    <line x1="143.5" y1="602" x2="156.5" y2="602" stroke="white" stroke-width="2.3" stroke-linecap="round"/>

    <!-- Tab 4: Horses (horse-variant simplified) -->
    <!-- Body oval -->
    <ellipse cx="209" cy="604" rx="8" ry="5" fill="none" stroke="#9E9E9E" stroke-width="1.6"/>
    <!-- Head circle -->
    <circle cx="219" cy="598" r="4.5" fill="none" stroke="#9E9E9E" stroke-width="1.6"/>
    <!-- Neck -->
    <line x1="214" y1="601" x2="216" y2="600" stroke="#9E9E9E" stroke-width="1.6"/>
    <!-- Ear -->
    <path d="M220,593.5 L222,591 L223,594" fill="none" stroke="#9E9E9E" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Legs -->
    <line x1="203" y1="609" x2="201" y2="616" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="207" y1="609" x2="206" y2="616" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="213" y1="609" x2="213" y2="616" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    <text x="212" y="626" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Hästar</text>

    <!-- Tab 5: Statistics (bar chart) -->
    <rect x="256" y="606" width="4" height="5" rx="1" fill="#9E9E9E"/>
    <rect x="262" y="601" width="4" height="10" rx="1" fill="#9E9E9E"/>
    <rect x="268" y="598" width="4" height="13" rx="1" fill="#9E9E9E"/>
    <text x="264" y="620" font-family="-apple-system,sans-serif" font-size="8.5" fill="#9E9E9E" text-anchor="middle">Statistik</text>
  </g>
</svg>
